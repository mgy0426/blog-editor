<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --paper: #fffef9;
    --ink: #1a1a1a;
    --ink-light: #555;
    --accent: #2d6a4f;
    --accent-light: #52b788;
    --border: #ddd9d0;
    --toolbar-bg: #1a1a1a;
    --toolbar-text: #e8e4dc;
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --danger: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--toolbar-bg);
    color: var(--toolbar-text);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--accent);
  }

  .logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--accent-light);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
  }
  .btn-save:hover { background: var(--accent-light); }

  .btn-new {
    background: transparent;
    color: var(--toolbar-text);
    border: 1px solid #444;
  }
  .btn-new:hover { border-color: var(--accent-light); color: var(--accent-light); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 28px 20px;
    gap: 24px;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .post-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .post-item {
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
    background: var(--paper);
    border-color: var(--border);
  }

  .post-item:hover { border-color: var(--accent-light); }
  .post-item.active { border-color: var(--accent); background: #e8f5ee; }

  .post-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .post-item-date {
    font-size: 11px;
    color: var(--ink-light);
  }

  .post-item-delete {
    float: right;
    color: #bbb;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.1s;
  }
  .post-item-delete:hover { color: var(--danger); }

  .no-posts {
    font-size: 12px;
    color: #aaa;
    padding: 8px 4px;
    font-style: italic;
  }

  /* ── Editor area ── */
  .editor-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .title-input {
    width: 100%;
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    padding: 8px 4px 12px;
    margin-bottom: 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .title-input:focus { border-bottom-color: var(--accent); }
  .title-input::placeholder { color: #ccc; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 2px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 52px;
    z-index: 10;
  }

  .toolbar-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 4px;
  }

  .tb {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    transition: all 0.1s;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
  }
  .tb:hover { background: #eee; }
  .tb.active { background: var(--accent); color: #fff; }

  .tb-label {
    padding: 0 10px;
    font-size: 12px;
    width: auto;
  }

  .font-size-select {
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 0 6px;
    background: white;
    color: var(--ink);
    cursor: pointer;
  }

  .color-input {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px;
    cursor: pointer;
    background: white;
  }

  /* ── Content editable ── */
  .editor-content {
    flex: 1;
    background: var(--paper);
    padding: 24px 28px;
    min-height: 500px;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink);
    caret-color: var(--accent);
    box-shadow: var(--shadow);
    border-radius: 0 0 8px 8px;
  }

  .editor-content:empty::before {
    content: '여기에 글을 작성하세요...';
    color: #ccc;
    pointer-events: none;
  }

  .editor-content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 12px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .editor-content img:hover { opacity: 0.9; }
  .editor-content img.selected { outline: 2px solid var(--accent); }

  .editor-content blockquote {
    border-left: 3px solid var(--accent);
    margin: 12px 0;
    padding: 4px 16px;
    color: var(--ink-light);
    font-style: italic;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--toolbar-bg);
    color: var(--toolbar-text);
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 13px;
    border-left: 3px solid var(--accent-light);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Image upload area ── */
  #imageInput { display: none; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .layout { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">✎ 블로그 에디터</div>
  <div class="header-actions">
    <button class="btn btn-new" onclick="newPost()">새 글</button>
    <button class="btn btn-save" onclick="savePost()">저장</button>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">저장된 글</div>
    <div class="post-list" id="postList"></div>
  </aside>

  <!-- Editor -->
  <div class="editor-wrapper">
    <input type="text" class="title-input" id="titleInput" placeholder="제목을 입력하세요">

    <div class="toolbar">
      <!-- Font size -->
      <select class="font-size-select" onchange="execCmd('fontSize', this.value); this.blur()">
        <option value="">크기</option>
        <option value="1">10px</option>
        <option value="2">13px</option>
        <option value="3">16px</option>
        <option value="4">18px</option>
        <option value="5">24px</option>
        <option value="6">32px</option>
      </select>

      <div class="toolbar-sep"></div>

      <!-- Format -->
      <button class="tb" title="굵게 (Ctrl+B)" onclick="execCmd('bold')"><b>B</b></button>
      <button class="tb" title="기울임 (Ctrl+I)" onclick="execCmd('italic')"><i>I</i></button>
      <button class="tb" title="밑줄 (Ctrl+U)" onclick="execCmd('underline')"><u>U</u></button>
      <button class="tb" title="취소선" onclick="execCmd('strikeThrough')"><s>S</s></button>

      <div class="toolbar-sep"></div>

      <!-- Color -->
      <input type="color" class="color-input" title="글자 색" value="#1a1a1a"
        oninput="execCmd('foreColor', this.value)">

      <div class="toolbar-sep"></div>

      <!-- Align -->
      <button class="tb tb-label" title="왼쪽 정렬" onclick="execCmd('justifyLeft')">≡</button>
      <button class="tb tb-label" title="가운데 정렬" onclick="execCmd('justifyCenter')">≣</button>
      <button class="tb tb-label" title="오른쪽 정렬" onclick="execCmd('justifyRight')">≡</button>

      <div class="toolbar-sep"></div>

      <!-- Lists -->
      <button class="tb" title="순서 없는 목록" onclick="execCmd('insertUnorderedList')">•≡</button>
      <button class="tb" title="순서 있는 목록" onclick="execCmd('insertOrderedList')">1≡</button>

      <div class="toolbar-sep"></div>

      <!-- Quote / HR -->
      <button class="tb tb-label" title="인용구" onclick="execCmd('formatBlock', 'blockquote')" style="font-size:16px">"</button>
      <button class="tb tb-label" title="구분선" onclick="insertHR()">—</button>

      <div class="toolbar-sep"></div>

      <!-- Image -->
      <button class="tb tb-label" title="사진 첨부" onclick="document.getElementById('imageInput').click()" style="font-size:18px">🖼</button>
      <input type="file" id="imageInput" accept="image/*" multiple onchange="insertImages(this)">
    </div>

    <div class="editor-content" id="editor" contenteditable="true"
      onkeydown="handleKeydown(event)"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let currentId = null;

  // ── execCommand wrapper ──
  function execCmd(cmd, value = null) {
    document.getElementById('editor').focus();
    document.execCommand(cmd, false, value);
  }

  function insertHR() {
    execCmd('insertHTML', '<hr style="border:none;border-top:2px solid #ddd;margin:16px 0">');
  }

  // ── Image insert ──
  function insertImages(input) {
    const files = Array.from(input.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        execCmd('insertHTML', `<img src="${e.target.result}" alt="">`);
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  // ── Keyboard shortcuts ──
  function handleKeydown(e) {
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      savePost();
    }
  }

  // ── Storage helpers ──
  function getPosts() {
    try { return JSON.parse(localStorage.getItem('blog_posts') || '{}'); }
    catch { return {}; }
  }

  function setPosts(posts) {
    localStorage.setItem('blog_posts', JSON.stringify(posts));
  }

  // ── New post ──
  function newPost() {
    currentId = null;
    document.getElementById('titleInput').value = '';
    document.getElementById('editor').innerHTML = '';
    document.getElementById('titleInput').focus();
    renderList();
  }

  // ── Save ──
  function savePost() {
    const title = document.getElementById('titleInput').value.trim() || '제목 없음';
    const content = document.getElementById('editor').innerHTML;

    const posts = getPosts();
    const id = currentId || ('post_' + Date.now());
    currentId = id;

    posts[id] = {
      id,
      title,
      content,
      date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    };

    setPosts(posts);
    renderList();
    showToast('저장되었습니다');
  }

  // ── Load ──
  function loadPost(id) {
    const posts = getPosts();
    const post = posts[id];
    if (!post) return;
    currentId = id;
    document.getElementById('titleInput').value = post.title;
    document.getElementById('editor').innerHTML = post.content;
    renderList();
  }

  // ── Delete ──
  function deletePost(id, e) {
    e.stopPropagation();
    if (!confirm('이 글을 삭제할까요?')) return;
    const posts = getPosts();
    delete posts[id];
    setPosts(posts);
    if (currentId === id) newPost();
    else renderList();
    showToast('삭제되었습니다');
  }

  // ── Render list ──
  function renderList() {
    const posts = getPosts();
    const list = document.getElementById('postList');
    const keys = Object.keys(posts).reverse();

    if (keys.length === 0) {
      list.innerHTML = '<div class="no-posts">저장된 글이 없습니다</div>';
      return;
    }

    list.innerHTML = keys.map(id => {
      const p = posts[id];
      const active = id === currentId ? 'active' : '';
      return `
        <div class="post-item ${active}" onclick="loadPost('${id}')">
          <button class="post-item-delete" onclick="deletePost('${id}', event)">×</button>
          <div class="post-item-title">${escHtml(p.title)}</div>
          <div class="post-item-date">${p.date}</div>
        </div>`;
    }).join('');
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Util ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init ──
  renderList();
</script>
</body>
</html>
